<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pending Reports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background-color: #e8e8e0; color: #2b2b2b; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 32px; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .report { background: white; border: 2px solid black; padding: 20px; margin-bottom: 20px; }
        .report-header { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .report-field { margin-bottom: 10px; }
        .report-label { font-size: 12px; color: #666; font-weight: bold; text-transform: uppercase; }
        .report-value { font-size: 16px; font-weight: bold; color: black; }
        .report-description { background-color: #fff8f0; border-left: 4px solid #991b1b; padding: 15px; margin: 15px 0; }
        .report-photo { max-height: 300px; border: 2px solid black; margin: 15px 0; }
        .report-actions { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 10px 20px; border: 2px solid black; font-weight: bold; cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px; }
        .btn-approve { background-color: #15803d; color: white; }
        .btn-approve:hover { background-color: #166534; }
        .btn-reject { background-color: #b91c1c; color: white; }
        .btn-reject:hover { background-color: #991b1b; }
        .loading { text-align: center; padding: 40px; font-size: 18px; }
        .no-reports { background: white; border: 2px solid black; padding: 20px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PENDING INCIDENT REPORTS</h1>
        <div id="reports"></div>
        <div id="loading" class="loading">Loading reports...</div>
    </div>

    <script>
        async function loadReports() {
            try {
                const res = await fetch('/api/admin/pending');
                if (!res.ok) throw new Error('Failed to load reports');
                const reports = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (!reports || reports.length === 0) {
                    document.getElementById('reports').innerHTML = '<div class="no-reports">No pending reports</div>';
                    return;
                }

                let html = '';
                reports.forEach(report => {
                    html += `
                        <div class="report">
                            <div class="report-header">
                                <div>
                                    <div class="report-field">
                                        <div class="report-label">Witness</div>
                                        <div class="report-value">${report.witness_name}</div>
                                        <div style="font-size: 12px; color: #666;">${report.witness_email}</div>
                                    </div>
                                </div>
                                <div>
                                    <div class="report-field">
                                        <div class="report-label">Incident Date</div>
                                        <div class="report-value">${new Date(report.incident_date).toLocaleString()}</div>
                                    </div>
                                </div>
                                <div>
                                    <div class="report-field">
                                        <div class="report-label">Location</div>
                                        <div class="report-value">Floor ${report.floor}, ${report.wing} - ${report.location}</div>
                                    </div>
                                </div>
                                <div>
                                    <div class="report-field">
                                        <div class="report-label">Subject Count</div>
                                        <div class="report-value">${report.cat_count}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="report-description">
                                <div class="report-label">Description</div>
                                <div style="color: black; margin-top: 8px;">${report.subject_description}</div>
                            </div>

                            ${report.photo_url ? `<img src="${report.photo_url}" alt="Evidence" class="report-photo" />` : ''}

                            ${report.additional_notes ? `
                                <div style="margin: 15px 0;">
                                    <div class="report-label">Notes</div>
                                    <div style="color: black; margin-top: 8px;">${report.additional_notes}</div>
                                </div>
                            ` : ''}

                            <div class="report-actions">
                                <button class="btn-approve" onclick="approveReport('${report.id}')">APPROVE</button>
                                <button class="btn-reject" onclick="rejectReport('${report.id}')">REJECT</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('reports').innerHTML = html;
            } catch (error) {
                document.getElementById('loading').innerHTML = `Error: ${error.message}`;
            }
        }

        async function approveReport(id) {
            try {
                const res = await fetch('/api/admin/pending', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reportId: id, status: 'approved' })
                });
                if (res.ok) {
                    alert('Report approved!');
                    loadReports();
                } else {
                    alert('Failed to approve');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function rejectReport(id) {
            try {
                const res = await fetch('/api/admin/pending', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reportId: id, status: 'rejected' })
                });
                if (res.ok) {
                    alert('Report rejected!');
                    loadReports();
                } else {
                    alert('Failed to reject');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        loadReports();
    </script>
</body>
</html>
